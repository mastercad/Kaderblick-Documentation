<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" font-family="Inter, sans-serif">
  <defs>
    <style>
      .part { fill: #e8f5e9; stroke: #018606; stroke-width: 1.5; transition: all 0.2s ease; }
      .part:hover, .part--hover { fill: #c8e6c9; stroke-width: 2.5; }
      .part--active { fill: #a5d6a7; stroke-width: 2.5; stroke: #005f04; }
      .part-label { font-size: 11px; fill: #1a1a1a; pointer-events: none; font-weight: 500; }
      .part-label-small { font-size: 9px; fill: #6b7280; pointer-events: none; }
      .connector { stroke: #9e9e9e; stroke-width: 1; stroke-dasharray: 4 2; fill: none; }
      .title { font-size: 16px; font-weight: 600; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="300" y="30" text-anchor="middle" class="title">Kaderblick-Kamera – Lasercutter-Schnittvorlage</text>

  <!-- Hauptgehäuse -->
  <g id="part-gehaeuse" class="part"
     data-orbit="0deg 75deg 105%"
     data-target="0m 0m 0m">
    <rect x="150" y="120" width="300" height="200" rx="12" />
    <text x="300" y="225" text-anchor="middle" class="part-label">Hauptgehäuse</text>
    <text x="300" y="242" text-anchor="middle" class="part-label-small">Lasercutter · 5 mm Sperrholz</text>
  </g>

  <!-- Deckel -->
  <g id="part-deckel" class="part"
     data-orbit="0deg 30deg 90%"
     data-target="0m 0.08m 0m">
    <rect x="170" y="60" width="260" height="45" rx="8" />
    <text x="300" y="88" text-anchor="middle" class="part-label">Gehäusedeckel</text>
  </g>
  <line x1="300" y1="105" x2="300" y2="120" class="connector" />

  <!-- Kamerafenster -->
  <g id="part-fenster" class="part"
     data-orbit="0deg 75deg 70%"
     data-target="0m 0.02m 0.05m">
    <rect x="220" y="155" width="160" height="50" rx="6" />
    <text x="300" y="185" text-anchor="middle" class="part-label">Kamerafenster</text>
  </g>

  <!-- Platine -->
  <g id="part-platine" class="part"
     data-orbit="180deg 60deg 90%"
     data-target="0m -0.02m 0m">
    <rect x="195" y="240" width="210" height="55" rx="4" />
    <text x="300" y="272" text-anchor="middle" class="part-label">Platine / Elektronik</text>
  </g>

  <!-- Kameramodul -->
  <g id="part-kameramodul" class="part"
     data-orbit="0deg 75deg 60%"
     data-target="0m 0.03m 0.04m">
    <circle cx="300" cy="180" r="16" />
    <text x="300" y="184" text-anchor="middle" class="part-label" style="font-size:9px;">📷</text>
  </g>

  <!-- Halterung -->
  <g id="part-halterung" class="part"
     data-orbit="0deg 120deg 110%"
     data-target="0m -0.08m 0m">
    <rect x="220" y="340" width="160" height="40" rx="6" />
    <text x="300" y="365" text-anchor="middle" class="part-label">Montagehalterung</text>
  </g>
  <line x1="300" y1="320" x2="300" y2="340" class="connector" />

  <!-- Kabelverschraubung links -->
  <g id="part-kabel" class="part"
     data-orbit="90deg 75deg 90%"
     data-target="-0.05m 0m 0m">
    <rect x="60" y="190" width="70" height="40" rx="6" />
    <text x="95" y="215" text-anchor="middle" class="part-label" style="font-size:9px;">Kabeldurchführung</text>
  </g>
  <line x1="130" y1="210" x2="150" y2="210" class="connector" />

  <!-- Netzteil-Anschluss -->
  <g id="part-netzteil" class="part"
     data-orbit="-90deg 75deg 90%"
     data-target="0.05m 0m 0m">
    <rect x="470" y="190" width="70" height="40" rx="6" />
    <text x="505" y="215" text-anchor="middle" class="part-label" style="font-size:9px;">Stromanschluss</text>
  </g>
  <line x1="450" y1="210" x2="470" y2="210" class="connector" />

  <!-- Legende-Hinweis -->
  <text x="300" y="480" text-anchor="middle" class="part-label-small" style="font-size: 10px;">
    Klicke auf ein Bauteil, um es im 3D-Modell zu fokussieren
  </text>
</svg>
