<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="Inter, sans-serif">
  <defs>
    <style>
      .part { fill: #e8f5e9; stroke: #018606; stroke-width: 1.5; transition: all 0.2s ease; }
      .part:hover, .part--hover { fill: #c8e6c9; stroke-width: 2.5; }
      .part--active { fill: #a5d6a7; stroke-width: 2.5; stroke: #005f04; }
      .part-label { font-size: 11px; fill: #1a1a1a; pointer-events: none; font-weight: 500; }
      .part-label-small { font-size: 9px; fill: #6b7280; pointer-events: none; }
      .connector { stroke: #9e9e9e; stroke-width: 1; stroke-dasharray: 4 2; fill: none; }
      .title { font-size: 16px; font-weight: 600; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="300" y="30" text-anchor="middle" class="title">PTZ-Kamera – Teilekarte</text>

  <!-- PTZ-Kamera -->
  <g id="part-ptz-kamera" class="part"
     data-orbit="0deg 65deg 100%"
     data-target="0m 0.05m 0m">
    <rect x="200" y="80" width="200" height="100" rx="12" />
    <text x="300" y="130" text-anchor="middle" class="part-label">PTZ-Kamera</text>
    <text x="300" y="148" text-anchor="middle" class="part-label-small">Pan · Tilt · Zoom</text>
  </g>

  <!-- Stativ-Adapter -->
  <g id="part-stativ-adapter" class="part"
     data-orbit="0deg 90deg 90%"
     data-target="0m 0m 0m">
    <rect x="230" y="195" width="140" height="40" rx="6" />
    <text x="300" y="220" text-anchor="middle" class="part-label">Stativ-Adapter</text>
  </g>
  <line x1="300" y1="180" x2="300" y2="195" class="connector" />

  <!-- Stativ -->
  <g id="part-stativ" class="part"
     data-orbit="0deg 110deg 120%"
     data-target="0m -0.1m 0m">
    <rect x="270" y="250" width="60" height="120" rx="4" />
    <text x="300" y="315" text-anchor="middle" class="part-label" style="font-size:10px;">Stativ</text>
  </g>
  <line x1="300" y1="235" x2="300" y2="250" class="connector" />

  <!-- Wetterschutz -->
  <g id="part-wetterschutz" class="part"
     data-orbit="0deg 40deg 90%"
     data-target="0m 0.08m 0m">
    <path d="M185 75 Q300 40 415 75" stroke-width="1.5" fill="none" />
    <rect x="185" y="55" width="230" height="22" rx="8" fill="#e8f5e9" />
    <text x="300" y="71" text-anchor="middle" class="part-label">Wetterschutz</text>
  </g>

  <!-- Kabelführung -->
  <g id="part-kabelfuehrung" class="part"
     data-orbit="90deg 85deg 100%"
     data-target="-0.03m 0m 0m">
    <rect x="345" y="265" width="30" height="90" rx="4" />
    <text x="430" y="312" text-anchor="start" class="part-label" style="font-size:10px;">Kabelführung</text>
  </g>
  <line x1="375" y1="310" x2="430" y2="312" class="connector" />

  <!-- PoE-Adapter -->
  <g id="part-poe" class="part"
     data-orbit="-45deg 80deg 110%"
     data-target="0.05m -0.05m 0m">
    <rect x="440" y="130" width="100" height="45" rx="6" />
    <text x="490" y="157" text-anchor="middle" class="part-label" style="font-size:10px;">PoE-Adapter</text>
  </g>
  <line x1="400" y1="140" x2="440" y2="148" class="connector" />

  <!-- Netzwerkkabel -->
  <g id="part-netzwerk" class="part"
     data-orbit="45deg 80deg 110%"
     data-target="-0.05m -0.05m 0m">
    <rect x="60" y="130" width="100" height="45" rx="6" />
    <text x="110" y="157" text-anchor="middle" class="part-label" style="font-size:10px;">Netzwerkkabel</text>
  </g>
  <line x1="160" y1="148" x2="200" y2="140" class="connector" />

  <!-- Legende-Hinweis -->
  <text x="300" y="430" text-anchor="middle" class="part-label-small" style="font-size: 10px;">
    Klicke auf ein Bauteil, um es im 3D-Modell zu fokussieren
  </text>
</svg>
