<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0fdf4" rx="8"/>
  <rect x="20" y="20" width="760" height="50" fill="#018606" rx="6"/>
