  <!-- Form fields -->
  <rect x="40" y="100" width="340" height="44" fill="white" rx="6" stroke="#e5e7eb"/>
  <text x="56" y="128" fill="#6b7280" font-family="Inter, sans-serif" font-size="13">Vorname</text>
  <rect x="40" y="164" width="340" height="44" fill="white" rx="6" stroke="#e5e7eb"/>
  <text x="56" y="192" fill="#6b7280" font-family="Inter, sans-serif" font-size="13">Nachname</text>
  <rect x="40" y="228" width="340" height="44" fill="white" rx="6" stroke="#e5e7eb"/>
  <text x="56" y="256" fill="#6b7280" font-family="Inter, sans-serif" font-size="13">Position</text>
  <rect x="40" y="292" width="160" height="44" fill="white" rx="6" stroke="#e5e7eb"/>
  <text x="56" y="320" fill="#6b7280" font-family="Inter, sans-serif" font-size="13">Trikotnr.</text>
  <rect x="220" y="292" width="160" height="44" fill="white" rx="6" stroke="#e5e7eb"/>
  <text x="236" y="320" fill="#6b7280" font-family="Inter, sans-serif" font-size="13">Geburtsdatum</text>
  <!-- Photo area -->
  <rect x="420" y="100" width="340" height="236" fill="#e5e7eb" rx="6"/>
  <circle cx="590" cy="200" r="60" fill="#d1d5db"/>
  <text x="590" y="290" text-anchor="middle" fill="#9ca3af" font-family="Inter, sans-serif" font-size="12">Profilbild-Upload</text>
  <!-- Save button -->
  <rect x="40" y="370" width="140" height="44" fill="#018606" rx="8"/>
  <text x="110" y="398" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600">Speichern</text>
  <text x="400" y="460" text-anchor="middle" fill="#9ca3af" font-family="Inter, sans-serif" font-size="11">📷 Ersetze dieses Bild durch einen echten Screenshot</text>
