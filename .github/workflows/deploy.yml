name: Deploy to Alfahosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ------------------------------
      # Checkout repository
      # ------------------------------
      - uses: actions/checkout@v3

      # ------------------------------
      # Cache Composer vendors
      # ------------------------------
      - name: Cache Composer vendors
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      # ------------------------------
      # Generate release directory
      # ------------------------------
      - name: Generate release directory name
        id: release
        run: echo "dir=${{ secrets.MAIN_PROJECT_PATH }}/releases/$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      # ------------------------------
      # Create release directory for SCP
      # ------------------------------
      - name: Create release directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            mkdir -p "${{ steps.release.outputs.dir }}"
            chmod 755 "${{ steps.release.outputs.dir }}"
            chown -R ${{ secrets.PLESK_USERNAME }}:psacln "${{ steps.release.outputs.dir }}"

      # ------------------------------
      # Copy build files to server
      # ------------------------------
      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USERNAME }}
          password: ${{ secrets.PLESK_PASSWORD }}
          source: "./*"
          target: "${{ steps.release.outputs.dir }}"
          strip_components: 1

      # ------------------------------
      # Deploy secrets & JWT
      # ------------------------------
      - name: Deploy secrets & JWT
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            RELEASE_DIR="${{ steps.release.outputs.dir }}"

            chown -R kaderblick-ftp-admin:psacln "$RELEASE_DIR"

      # ------------------------------
      # Prepare .env files
      # ------------------------------
      - name: Prepare .env files
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            RELEASE_DIR="${{ steps.release.outputs.dir }}"
            cd "$RELEASE_DIR"

            cp .env.dist .env
            sed -i 's/^APP_ENV=dev$/APP_ENV=prod/' .env

      # ------------------------------
      # Build & start Staging
      # ------------------------------
      - name: Build & start Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            RELEASE_DIR="${{ steps.release.outputs.dir }}"
            cd "$RELEASE_DIR"

            docker compose -p staging down --remove-orphans app
            APP_PORT=18181 docker compose -p staging up -d --build --force-recreate app

      # ------------------------------
      # Staging Composer
      # ------------------------------
      - name: Staging Composer
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            RELEASE_DIR="${{ steps.release.outputs.dir }}"
            cd "$RELEASE_DIR"

            docker compose -p staging exec -T app composer install --no-dev --optimize-autoloader

      # ------------------------------
      # Tag Images
      # ------------------------------
      - name: Tag Images
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            RELEASE_DIR="${{ steps.release.outputs.dir }}"
            cd "$RELEASE_DIR"

            APP_IMAGE_ID=$(docker images staging-app:latest --format "{{.ID}}" | head -n 1)
            if [ -n "$APP_IMAGE_ID" ]; then
              docker tag $APP_IMAGE_ID kaderblick-docs-production-app:latest
            fi

      # ------------------------------
      # Activate Release (Zero-Downtime)
      # ------------------------------
      - name: Activate Release
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            RELEASE_DIR="${{ steps.release.outputs.dir }}"
            CURRENT_DIR="${{ secrets.MAIN_PROJECT_PATH }}/current"

            docker compose -p production down --remove-orphans app
            ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"
            chmod -R 777 "$CURRENT_DIR/app/var"

            cd "$CURRENT_DIR"
            docker compose -p production up -d --force-recreate app
            docker compose -p staging down app
            docker compose -p staging rm app

            # Cleanup old releases
            cd ../releases && ls -1dt * | tail -n +4 | xargs -r rm -rf
