name: Deploy to Alfahosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ------------------------------
      # Checkout repository
      # ------------------------------
      - uses: actions/checkout@v3

      # ------------------------------
      # Cache Composer vendors
      # ------------------------------
      - name: Cache Composer vendors
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      # ------------------------------
      # Generate release directory
      # ------------------------------
      - name: Generate release directory name
        id: release
        run: echo "dir=${{ secrets.MAIN_PROJECT_PATH }}/releases/$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      # ------------------------------
      # Prepare build files
      # ------------------------------
      - name: Prepare files
        run: |
          mkdir -p build
          cp -r docker-compose.yaml .docker .env.dist composer.json composer.lock symfony.lock bin config public src templates translations build/

      # ------------------------------
      # Create release directory for SCP
      # ------------------------------
                
      - name: Create release directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            mkdir -p "${{ steps.release.outputs.dir }}"
            chmod 755 "${{ steps.release.outputs.dir }}"
            chown -R ${{ secrets.PLESK_USERNAME }}:psacln "${{ steps.release.outputs.dir }}"

      # ------------------------------
      # Copy build files to server
      # ------------------------------
      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USERNAME }}
          password: ${{ secrets.PLESK_PASSWORD }}
          source: "build/*"
          target: "${{ steps.release.outputs.dir }}"
          strip_components: 1

      # ------------------------------
      # Prepare .env files
      # ------------------------------
      - name: Prepare .env files
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            RELEASE_DIR="${{ steps.release.outputs.dir }}"
            cd "$RELEASE_DIR"

            cp .env.dist .env
            sed -i 's/^APP_ENV=dev$/APP_ENV=prod/' .env

      # ------------------------------
      # Build & start
      # ------------------------------
      - name: Build
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            RELEASE_DIR="${{ steps.release.outputs.dir }}"
            cd "$RELEASE_DIR"
            
            chmod -R 755 "$RELEASE_DIR"
            chown -R kaderblick-ftp-admin:psacln "$RELEASE_DIR"

            docker compose -p kaderblick-docs down --remove-orphans app
            docker compose -p kaderblick-docs up -d --build --force-recreate app

      # ------------------------------
      # Composer
      # ------------------------------
      - name: Composer
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            RELEASE_DIR="${{ steps.release.outputs.dir }}"
            cd "$RELEASE_DIR"

            docker compose -p kaderblick-docs exec -T app composer install --no-dev --optimize-autoloader

      # ------------------------------
      # Activate Release (Zero-Downtime)
      # ------------------------------
      - name: Activate Release
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            RELEASE_DIR="${{ steps.release.outputs.dir }}"
            CURRENT_DIR="${{ secrets.MAIN_PROJECT_PATH }}/current"

            docker compose -p kaderblick-docs down --remove-orphans app
            ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"
            chmod -R 777 "$CURRENT_DIR/var"

            cd "$CURRENT_DIR"
            docker compose -p kaderblick-docs up -d --force-recreate app

      - name: Cleanup old releases
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            cd "${{ secrets.MAIN_PROJECT_PATH }}/releases"
            ls -1t | tail -n +4 | xargs -I {} rm -rf {}
